tags:
  - name: Broadcasts
    description: Single-Email Campaigns (Broadcasts) are one-time emails sent to a segment of your subscribers.
    x-slate:
      title: Single-Email Campaigns <br/>(aka Broadcasts)
      represent:
        - intro: "Single-Email Campaigns are represented as follows:"
          schema: Broadcast
        - intro: "All responses containing Single-Email Campaign data also include the following top-level link data:"
          json: |
            {
              "links": {
                "broadcasts.account": "https://api.getdrip.com/v2/accounts/{broadcasts.account}"
              }
            }
      properties: Broadcast
      lead_extra: |
        ## Email Content

        > The content object structure:

        ```json
        {
          "content": {
            "html": {
              "type": "document",
              "value": "<html><body><h1>Hello!</h1></body></html>"
            },
            "text": {
              "type": "document",
              "value": "Hello!\n\nWelcome to our newsletter."
            }
          }
        }
        ```

        Email content is provided via a `content` object containing content type keys. Each key maps
        to an object with a `type` (the content variant) and a `value` (the content itself).

        <table>
          <thead>
            <tr>
              <th>Key</th>
              <th>Description</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><code>html</code></td>
              <td>Required when creating. The HTML email content. Currently the only supported <code>type</code> is <code>document</code>: a full HTML document with a complete <code>&lt;html&gt;</code> structure. Supports Liquid templating.</td>
            </tr>
            <tr>
              <td><code>text</code></td>
              <td>Optional. The plain text version of the email. Currently the only supported <code>type</code> is <code>document</code>: a full plain text document. Supports Liquid templating. If omitted, the plain text version is generated automatically from the HTML.</td>
            </tr>
          </tbody>
        </table>

        HTML content is validated and sanitized for security: JavaScript is not allowed, and dangerous
        CSS patterns are blocked.

paths:
  /{account_id}/broadcasts:
    parameters:
      - $ref: "../components.yaml#/components/parameters/accountId"

    get:
      operationId: listBroadcasts
      tags: [Broadcasts]
      summary: List all Single-Email Campaigns
      x-slate:
        intro: "To list Single-Email Campaigns in an account:"
        response:
          intro: "The response looks like this:"
        arguments: auto
      parameters:
        - name: page
          in: query
          description: The page number (1-indexed). Defaults to `1`.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          description: The number of results per page, up to a maximum of `100`. Defaults to `100`.
          schema:
            type: integer
            maximum: 100
            default: 100
        - name: status
          in: query
          description: >-
            Filter by one of the following statuses: `draft`, `scheduled`,
            `sending`, `sent`, `canceled`, `deleted`, or `all`. By default,
            deleted Single-Email Campaigns are excluded; use `status=deleted`
            or `status=all` to include them.
          schema:
            type: string
            enum: [draft, scheduled, sending, sent, canceled, deleted, all]
        - name: sort
          in: query
          description: >-
            Sort results by one of these fields: `created_at`, `updated_at`,
            `send_at`, or `name`. Defaults to `created_at`.
          schema:
            type: string
            enum: [created_at, updated_at, send_at, name]
            default: created_at
        - name: direction
          in: query
          description: "Filter sort direction with: `asc` or `desc`. Defaults to `asc`."
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: >-
            A paginated list of Single-Email Campaigns. The `broadcasts`
            property is an array of broadcast objects.
          content:
            application/json:
              schema:
                type: object
                required: [broadcasts]
                properties:
                  links:
                    type: object
                    description: Top-level link data.
                    properties:
                      "broadcasts.account":
                        type: string
                  meta:
                    type: object
                    description: Pagination metadata.
                    properties:
                      page:
                        type: integer
                      sort:
                        type: string
                      direction:
                        type: string
                      count:
                        type: integer
                      total_pages:
                        type: integer
                      total_count:
                        type: integer
                      status:
                        type: string
                  broadcasts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Broadcast"
              example:
                links:
                  broadcasts.account: "https://api.getdrip.com/v2/accounts/{broadcasts.account}"
                meta:
                  page: 1
                  sort: created_at
                  direction: asc
                  count: 5
                  total_pages: 1
                  total_count: 5
                  status: all
                broadcasts:
                  - id: "123456"
                    status: sent
                    name: "4 Marketing Automation Trends for 2015"
                    from_name: John Doe
                    from_email: john@example.com
                    postal_address: "123 Anywhere St\nFresno, CA 99999"
                    localize_sending_time: true
                    send_at: "2015-07-01T10:00:00Z"
                    bcc: null
                    created_at: "2015-06-21T10:31:58Z"
                    href: "https://api.getdrip.com/v2/9999999/broadcast/123456"
                    preview_url: "https://www.getdrip.com/broadcasts/123456/2d83a64861f23b1c35a3b8d6ee3b54f7"
                    subject: "4 Marketing Automation Trends for 2015"
                    html_body: HTML body
                    text_body: Text body
                    links:
                      account: "9999999"
        "4XX":
          $ref: "../components.yaml#/components/responses/Error"
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl "https://api.getdrip.com/v2/YOUR_ACCOUNT_ID/broadcasts" \
              -H "Content-Type: application/json" \
              -H 'User-Agent: Your App Name (www.yourapp.com)' \
              -u YOUR_API_KEY:
        - lang: ruby
          label: Ruby
          source: |
            require 'drip'

            client = Drip::Client.new do |c|
              c.api_key = "YOUR API KEY"
              c.account_id = "YOUR_ACCOUNT_ID"
            end

            response = client.broadcasts

            if response.success?
              puts response.body["broadcasts"]
            end
        - lang: javascript
          label: JavaScript
          source: |
            // npm install drip-nodejs --save

            const client = require('drip-nodejs')({ token: YOUR_API_KEY, accountId: YOUR_ACCOUNT_ID });
            const options = { status: "sent" };

            client.listBroadcasts(options)
              .then((response) => {
                // Handle `response.body`
              })
              .catch((error) => {
                // Handle errors
              });

    post:
      operationId: createBroadcast
      tags: [Broadcasts]
      summary: Create a Single-Email Campaign
      description: >-
        Single-Email Campaigns created via the API start in the `draft` status.
        Scheduling and sending are then managed through the Drip UI.
      x-slate:
        intro: "To create a Single-Email Campaign:"
        response:
          - intro: "Responds with a `201 Created` and the new Single-Email Campaign if successful. The `Location` header contains the URL of the created record:"
          - intro: "If the request is invalid, responds with a `422 Unprocessable Entity`:"
            status: "422"
        show-description: true
        arguments: auto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [broadcasts]
              properties:
                broadcasts:
                  type: array
                  items:
                    $ref: "#/components/schemas/NewBroadcast"
            example:
              broadcasts:
                - name: December Newsletter
                  subject: "Your December Newsletter is here!"
                  preheader: "See what's new this month..."
                  content:
                    html:
                      type: document
                      value: "<html><body><h1>Hello!</h1></body></html>"
                    text:
                      type: document
                      value: "Hello! Welcome to our newsletter."
                  postal_address: "123 Main St, Minneapolis, MN 55401"
      responses:
        "201":
          description: >-
            Created. Responds with the new Single-Email Campaign. The
            `Location` header contains the URL of the created record.
          content:
            application/json:
              schema:
                type: object
                required: [broadcasts]
                properties:
                  links:
                    type: object
                    description: Top-level link data.
                    properties:
                      "broadcasts.account":
                        type: string
                  broadcasts:
                    type: array
                    description: An array containing the new broadcast object.
                    items:
                      $ref: "#/components/schemas/Broadcast"
              example:
                links:
                  broadcasts.account: "https://api.getdrip.com/v2/accounts/{broadcasts.account}"
                broadcasts:
                  - id: "123456"
                    status: draft
                    name: "4 Marketing Automation Trends for 2015"
                    from_name: John Doe
                    from_email: john@example.com
                    postal_address: "123 Anywhere St\nFresno, CA 99999"
                    localize_sending_time: true
                    send_at: "2015-07-01T10:00:00Z"
                    bcc: null
                    created_at: "2015-06-21T10:31:58Z"
                    href: "https://api.getdrip.com/v2/9999999/broadcast/123456"
                    preview_url: "https://www.getdrip.com/broadcasts/123456/2d83a64861f23b1c35a3b8d6ee3b54f7"
                    subject: "4 Marketing Automation Trends for 2015"
                    html_body: HTML body
                    text_body: Text body
                    links:
                      account: "9999999"
        "422":
          $ref: "../components.yaml#/components/responses/ValidationError"
        "4XX":
          $ref: "../components.yaml#/components/responses/Error"
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl -X POST "https://api.getdrip.com/v2/YOUR_ACCOUNT_ID/broadcasts" \
              -H "Content-Type: application/json" \
              -H 'User-Agent: Your App Name (www.yourapp.com)' \
              -u YOUR_API_KEY: \
              -d @- << EOF
              {
                "broadcasts": [{
                  "name": "December Newsletter",
                  "subject": "Your December Newsletter is here!",
                  "preheader": "See what's new this month...",
                  "content": {
                    "html": {
                      "type": "document",
                      "value": "<html><body><h1>Hello!</h1></body></html>"
                    },
                    "text": {
                      "type": "document",
                      "value": "Hello! Welcome to our newsletter."
                    }
                  },
                  "postal_address": "123 Main St, Minneapolis, MN 55401"
                }]
              }
            EOF
        - lang: ruby
          label: Ruby
          source: |
            require "net/http"
            require "json"

            uri = URI("https://api.getdrip.com/v2/YOUR_ACCOUNT_ID/broadcasts")

            request = Net::HTTP::Post.new(uri)
            request.basic_auth("YOUR_API_KEY", "")
            request["User-Agent"] = "Your App Name (www.yourapp.com)"
            request["Content-Type"] = "application/json"
            request.body = {
              broadcasts: [{
                name: "December Newsletter",
                subject: "Your December Newsletter is here!",
                preheader: "See what's new this month...",
                content: {
                  html: {
                    type: "document",
                    value: "<html><body><h1>Hello!</h1></body></html>"
                  },
                  text: {
                    type: "document",
                    value: "Hello! Welcome to our newsletter."
                  }
                },
                postal_address: "123 Main St, Minneapolis, MN 55401"
              }]
            }.to_json

            response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
              http.request(request)
            end

            puts response.body
        - lang: javascript
          label: JavaScript
          source: |
            const response = await fetch(
              "https://api.getdrip.com/v2/YOUR_ACCOUNT_ID/broadcasts",
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "User-Agent": "Your App Name (www.yourapp.com)",
                  "Authorization": "Basic " + Buffer.from("YOUR_API_KEY:").toString("base64")
                },
                body: JSON.stringify({
                  broadcasts: [{
                    name: "December Newsletter",
                    subject: "Your December Newsletter is here!",
                    preheader: "See what's new this month...",
                    content: {
                      html: {
                        type: "document",
                        value: "<html><body><h1>Hello!</h1></body></html>"
                      },
                      text: {
                        type: "document",
                        value: "Hello! Welcome to our newsletter."
                      }
                    },
                    postal_address: "123 Main St, Minneapolis, MN 55401"
                  }]
                })
              }
            );

            const body = await response.json();

