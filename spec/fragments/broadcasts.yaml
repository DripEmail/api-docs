        in: path
        required: true
        description: The ID of the Single-Email Campaign.
        schema:
          type: string

    post:
      operationId: sendBroadcastTestEmail
      tags: [Broadcasts]
      summary: Send a test email
      description: |-
        Sends a test email so you can preview how the Single-Email Campaign will appear to
        recipients. Test emails are marked with a "[TEST]" prefix in the from name, and any
        links that would trigger automations are stripped for safety. If sending is blocked
        on the account (for example, during a trial), tests are only delivered to the
        authenticated user.

        ### Recipient validation

        Each recipient email address must satisfy **one** of the following requirements:

        1. **Verified domain**: the email's domain is a verified sending domain in the account
           (e.g., if `example.com` is verified, `anyone@example.com` is allowed).
        2. **Active account member**: the email belongs to an active member of the account.

        Recipients that do not meet either requirement are rejected with a `422` validation error.

        ### Rate limits

        Rate limits are applied per user.

        | Limit | Window |
        | --- | --- |
        | 5 recipients | Per request |
        | 20 requests | Per hour |
        | 40 requests | Per day |
      x-slate:
        intro: "To send a test email for a Single-Email Campaign:"
        response:
          - intro: "Responds with a `204 No Content` if successful."
          - intro: "If a recipient is not allowed, responds with a `422 Unprocessable Entity`:"
            status: "422"
          - intro: "If a rate limit is exceeded, responds with a `429 Too Many Requests` and a `Retry-After` header indicating when the limit resets:"
            status: "429"
        sections: |
          Sends a test email so you can preview how the Single-Email Campaign will appear to
          recipients. Test emails are marked with a "[TEST]" prefix in the from name, and any
          links that would trigger automations are stripped for safety. If sending is blocked
          on the account (for example, during a trial), tests are only delivered to the
          authenticated user.

          ### Recipient validation

          Each recipient email address must satisfy **one** of the following requirements:

          1. **Verified domain**: the email's domain is a verified sending domain in the account
             (e.g., if `example.com` is verified, `anyone@example.com` is allowed).
          2. **Active account member**: the email belongs to an active member of the account.

          Recipients that do not meet either requirement are rejected with a `422` validation error.

          ### Rate limits

          Rate limits are applied per user.

          <table>
            <thead>
              <tr>
                <th>Limit</th>
                <th>Window</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>5 recipients</td>
                <td>Per request</td>
              </tr>
              <tr>
                <td>20 requests</td>
                <td>Per hour</td>
              </tr>
              <tr>
                <td>40 requests</td>
                <td>Per day</td>
              </tr>
            </tbody>
          </table>
        arguments: auto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to_emails]
              properties:
                to_emails:
                  type: array
                  description: >-
                    An array of 1 to 5 email addresses to send the test to.
                    See recipient validation above.
                  minItems: 1
                  maxItems: 5
                  items:
                    type: string
                    format: email
                preview_as:
                  type: string
                  format: email
                  description: >-
                    The email address of an existing subscriber to use for
                    Liquid template rendering. The test email is personalized
                    as if sent to this subscriber, using their custom fields
                    and tags. If omitted, Liquid variables use placeholder
                    values.
            example:
              to_emails:
                - team@yourverifieddomain.com
              preview_as: subscriber@example.com
      responses:
        "204":
          description: No Content. The test email was sent.
        "422":
          description: >-
            Unprocessable Entity. A recipient is not a verified domain or
            active account member.
          content:
            application/json:
              schema:
                $ref: "../components.yaml#/components/schemas/ErrorResponse"
              example:
                errors:
                  - code: validation_error
                    attribute: to_emails
                    message: test@unknown-domain.com is not a verified domain or active account member
        "429":
          description: >-
            Too Many Requests. A rate limit was exceeded; the `Retry-After`
            header indicates when the limit resets.
          content:
            application/json:
              schema:
                $ref: "../components.yaml#/components/schemas/ErrorResponse"
              example:
                errors:
                  - code: rate_limit_error
                    message: Hourly test email limit exceeded. Maximum 20 requests per hour.
        "4XX":
          $ref: "../components.yaml#/components/responses/Error"
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl -X POST "https://api.getdrip.com/v2/YOUR_ACCOUNT_ID/broadcasts/BROADCAST_ID/send_test" \
              -H "Content-Type: application/json" \
              -H 'User-Agent: Your App Name (www.yourapp.com)' \
              -u YOUR_API_KEY: \
              -d @- << EOF
              {
                "to_emails": ["team@yourverifieddomain.com"],
                "preview_as": "subscriber@example.com"
              }
            EOF
        - lang: ruby
          label: Ruby
          source: |
            require "net/http"
            require "json"

            uri = URI("https://api.getdrip.com/v2/YOUR_ACCOUNT_ID/broadcasts/BROADCAST_ID/send_test")

            request = Net::HTTP::Post.new(uri)
            request.basic_auth("YOUR_API_KEY", "")
            request["User-Agent"] = "Your App Name (www.yourapp.com)"
            request["Content-Type"] = "application/json"
            request.body = {
              to_emails: ["team@yourverifieddomain.com"],
              preview_as: "subscriber@example.com"
            }.to_json

            response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
              http.request(request)
            end

            puts response.code
        - lang: javascript
          label: JavaScript
          source: |
            const response = await fetch(
              "https://api.getdrip.com/v2/YOUR_ACCOUNT_ID/broadcasts/BROADCAST_ID/send_test",
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "User-Agent": "Your App Name (www.yourapp.com)",
                  "Authorization": "Basic " + Buffer.from("YOUR_API_KEY:").toString("base64")
                },
                body: JSON.stringify({
                  to_emails: ["team@yourverifieddomain.com"],
                  preview_as: "subscriber@example.com"
                })
              }
            );

            // 204 No Content on success

components:
  schemas:
    Broadcast:
      type: object
      description: >-
        A Single-Email Campaign (Broadcast) — a one-time email sent to a
        segment of your subscribers. Scheduling (`send_at`,
        `localize_sending_time`) and recipient segmentation are managed
        through the Drip UI only; these fields are returned as read-only
        values in API responses and cannot be set via the API.
      example:
        id: "123456"
        status: sent
        name: "4 Marketing Automation Trends for 2015"
        from_name: John Doe
        from_email: john@example.com
        postal_address: "123 Anywhere St\nFresno, CA 99999"
        localize_sending_time: true
        send_at: "2015-07-01T10:00:00Z"
        bcc: null
        created_at: "2015-06-21T10:31:58Z"
        href: "https://api.getdrip.com/v2/9999999/broadcast/123456"
        preview_url: "https://www.getdrip.com/broadcasts/123456/2d83a64861f23b1c35a3b8d6ee3b54f7"
        subject: "4 Marketing Automation Trends for 2015"
        html_body: HTML body
        text_body: Text body
        links:
          account: "9999999"
      properties:
        id:
          type: string
          description: >-
            A read-only Drip generated unique id used to identify each
            Single-Email Campaign record.
        status:
          type: string
          enum: [draft, scheduled, sending, sent, canceled, deleted]
          description: >-
            Returns whether the Single-Email Campaign is draft, canceled,
            scheduled, sent or sending. Read-only via the API and managed
            through the Drip UI. Drafts are the only Single-Email Campaigns
            that can be edited via the API; `sending` campaigns cannot be
            deleted; `deleted` campaigns are hidden from default listings.
        name:
          type: string
          description: The private name given to the Single-Email Campaign.
        from_name:
          type: string
          description: >-
            A "from name" that appears in your sent emails and can be changed
            on a per email basis. This setting overrides the account's default
            from name.
        from_email:
          type: string
          description: >-
            A "from email" that appears in your sent emails and can be changed
            on a per email basis. This setting overrides the account's default
            from email.
        postal_address:
          type: string
          description: >-
            As required by the [CAN-SPAM Act](http://1.usa.gov/YgrzFP), this
            is a postal address used for all sent emails and can be changed on
            a per email basis.
        localize_sending_time:
          type: boolean
          description: >-
            The scheduled send_at time if set to be sent in the subscriber's
            time zone.
        send_at:
          type: ["string", "null"]
          format: date-time
          description: >-
            The timestamp representing when the Single-Email Campaign will be
            delivered.
        bcc:
          type: ["array", "null"]
          items:
            type: string
          description: >-
            A list of emails designated to receive a blind copy of the
            Single-Email Campaign.
        created_at:
          type: string
          format: date-time
          description: >-
            A read-only Drip generated timestamp for when the Single-Email
            Campaign was first created.
        href:
          type: string
          description: >-
            The url designated for retrieving the record via the REST API.
        preview_url:
          type: ["string", "null"]
          description: >-
            A read-only public URL for previewing the email content. Does not
            require authentication. Returns `null` for deleted Single-Email
            Campaigns.
        subject:
          type: string
          description: The Single-Email Campaign's subject.
        html_body:
          type: string
          description: The HTML content used in the email's body.
        text_body:
          type: string
          description: The plain text content used in the email's body.
        links:
          type: object
          description: An object containing the account's REST API URL.
          properties:
            account:
              type: string

    EmailContent:
      type: object
      description: >-
        Email content, containing content type keys. Each key maps to an
        object with a `type` (the content variant) and a `value` (the content
        itself). HTML content is validated and sanitized for security:
        JavaScript is not allowed, and dangerous CSS patterns are blocked.
      properties:
        html:
          type: object
          description: >-
            Required when creating. The HTML email content. Currently the only
            supported `type` is `document`: a full HTML document with a
            complete `<html>` structure. Supports Liquid templating.
          required: [type, value]
          properties:
            type:
              type: string
              enum: [document]
              description: The content variant.
            value:
              type: string
              description: The content itself.
        text:
          type: object
          description: >-
            Optional. The plain text version of the email. Currently the only
            supported `type` is `document`: a full plain text document.
            Supports Liquid templating. If omitted, the plain text version is
            generated automatically from the HTML.
          required: [type, value]
          properties:
            type:
              type: string
              enum: [document]
              description: The content variant.
            value:
              type: string
              description: The content itself.

    NewBroadcast:
      type: object
      required: [name, subject, content]
      properties:
        name:
          type: string
          maxLength: 255
          description: >-
            The private name given to the Single-Email Campaign (255
            characters maximum).
        subject:
          type: string
          description: The email subject line. Supports Liquid templating.
        content:
          $ref: "#/components/schemas/EmailContent"
          description: >-
            An Email Content object. At minimum, include an `html` key.
            Optionally include a `text` key for the plain text version; if
            omitted, the plain text version is generated from the HTML.
        preheader:
          type: string
          description: >-
            Preview text shown in email clients before the email is opened.
            Supports Liquid templating.
        postal_address:
          type: string
          description: >-
            A physical mailing address for CAN-SPAM compliance. Defaults to
            the account's postal address.

    BroadcastUpdate:
      type: object
      properties:
        name:
          type: string
          description: The private name given to the Single-Email Campaign.
        subject:
          type: string
          description: The email subject line. Supports Liquid templating.
        content:
          $ref: "#/components/schemas/EmailContent"
          description: >-
            An Email Content object with `html` and/or `text` keys.
        preheader:
          type: string
          description: >-
            Preview text shown in email clients before the email is opened.
            Supports Liquid templating.
        postal_address:
          type: string
          description: A physical mailing address for CAN-SPAM compliance.
