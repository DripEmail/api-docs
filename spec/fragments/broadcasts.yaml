    patch:
      operationId: updateBroadcast
      tags: [Broadcasts]
      summary: Update a Single-Email Campaign
      description: >-
        Only Single-Email Campaigns in the `draft` status can be updated via
        the API; all other statuses are read-only. Updates are partial: only
        the fields you include are changed.


        Status, scheduling (`send_at`, `localize_sending_time`), and recipient
        segmentation cannot be updated via the API — they are managed through
        the Drip UI.
      x-slate:
        intro: "To update a Single-Email Campaign:"
        response:
          - intro: "Responds with a `200 OK` and the updated Single-Email Campaign if successful:"
          - intro: "If the Single-Email Campaign is not a draft, responds with a `409 Conflict`:"
            status: "409"
        show-description: true
        arguments: auto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [broadcasts]
              properties:
                broadcasts:
                  type: array
                  items:
                    $ref: "#/components/schemas/BroadcastUpdate"
            example:
              broadcasts:
                - subject: "Updated: December Newsletter!"
                  preheader: "New content inside..."
                  content:
                    html:
                      type: document
                      value: "<html><body><h1>Updated content!</h1></body></html>"
      responses:
        "200":
          description: OK. The updated Single-Email Campaign.
          content:
            application/json:
              schema:
                type: object
                required: [broadcasts]
                properties:
                  links:
                    type: object
                    description: Top-level link data.
                    properties:
                      "broadcasts.account":
                        type: string
                  broadcasts:
                    type: array
                    description: An array of one broadcast object.
                    items:
                      $ref: "#/components/schemas/Broadcast"
              example:
                links:
                  broadcasts.account: "https://api.getdrip.com/v2/accounts/{broadcasts.account}"
                broadcasts:
                  - id: "123456"
                    status: draft
                    name: "4 Marketing Automation Trends for 2015"
                    from_name: John Doe
                    from_email: john@example.com
                    postal_address: "123 Anywhere St\nFresno, CA 99999"
                    localize_sending_time: true
                    send_at: "2015-07-01T10:00:00Z"
                    bcc: null
                    created_at: "2015-06-21T10:31:58Z"
                    href: "https://api.getdrip.com/v2/9999999/broadcast/123456"
                    preview_url: "https://www.getdrip.com/broadcasts/123456/2d83a64861f23b1c35a3b8d6ee3b54f7"
                    subject: "Updated: December Newsletter!"
                    html_body: HTML body
                    text_body: Text body
                    links:
                      account: "9999999"
        "409":
          description: Conflict. The Single-Email Campaign is not a draft.
