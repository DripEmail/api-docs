  /{account_id}/campaigns/{campaign_id}/subscribers:
    parameters:
      - $ref: "../components.yaml#/components/parameters/accountId"
      - name: campaign_id
        in: path
        required: true
        description: The ID of the Email Series Campaign.
        schema:
