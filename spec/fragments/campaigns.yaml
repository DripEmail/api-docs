components:
  schemas:
    Campaign:
      type: object
      example:
        id: "123456"
        status: active
        name: SEO Email Course
        from_name: John Doe
        from_email: john@example.com
        postal_address: "123 Anywhere St\nFresno, CA 99999"
        minutes_from_midnight: 440
        localize_sending_time: true
        days_of_the_week_mask: "0111110"
        start_immediately: true
        double_optin: true
        send_to_confirmation_page: false
        use_custom_confirmation_page: false
        confirmation_url: null
        notify_subscribe_email: derrick@getdrip.com
        notify_unsubscribe_email: derrick@getdrip.com
        bcc: null
        email_count: 10
        active_subscriber_count: 320
        unsubscribed_subscriber_count: 5
        created_at: "2013-06-21T10:31:58Z"
        href: "https://api.getdrip.com/v2/9999999/campaigns/123456"
        links:
          account: "9999999"
          forms: ["888"]
      properties:
        id:
          type: string
          description: A read-only Drip generated unique id used to identify each Email Series Campaign record.
        status:
          type: string
          description: Returns whether the Email Series Campaign is active, paused or in draft.
        name:
          type: string
          description: The private name given to the Email Series Campaign.
        from_name:
          type: string
          description: A "from name" that appears in your sent emails. This setting overrides the account's default from name.
        from_email:
          type: string
          description: A "from email" that appears in your sent emails. This setting overrides the account's default from email.
        postal_address:
          type: string
          description: As required by the [CAN-SPAM Act](http://1.usa.gov/YgrzFP), this is a postal address used for all sent emails.
        minutes_from_midnight:
          type: integer
          description: The number of minutes after midnight for the time of day set for email sending.
        localize_sending_time:
          type: boolean
          description: The scheduled send_at time if set to be sent in the subscriber's time zone.
        days_of_the_week_mask:
          type: string
          description: A representation of the days of week when emails are set to be sent. For example, `1111100` represents sending enabled only for Mondays to Fridays while `1111111` represents sending enabled for all days of the week.
        start_immediately:
          type: boolean
          description: Returns true if the first email in the Email Series Campaign is set to be delivered immediately after a Email Series Campaign subscription.
        double_optin:
          type: boolean
          description: Returns true if double opt-in is enabled for the Email Series Campaign.
        send_to_confirmation_page:
          type: boolean
          description: Deprecated
