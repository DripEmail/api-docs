    post:
      operationId: subscribeToCampaign
      tags: [Campaigns]
      summary: Subscribe someone to an Email Series Campaign
      x-slate:
        intro: "To start a subscriber on an Email Series Campaign:"
        response:
          intro: "The response looks like this:"
        arguments: auto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subscribers]
              properties:
                subscribers:
                  type: array
                  items:
                    $ref: "#/components/schemas/CampaignSubscriber"
            example:
              subscribers:
                - email: john@acme.com
                  utc_offset: 660
                  double_optin: true
                  starting_email_index: 0
                  reactivate_if_removed: true
                  custom_fields:
                    shirt_size: Medium
      responses:
        "200":
          description: The `subscribers` property is an array of one object.
          content:
            application/json:
              schema:
                type: object
                properties:
                  links:
                    type: object
                  subscribers:
                    type: array
                    description: An array of one subscriber object (documented under the Subscribers resource).
                    items:
                      type: object
              example:
                links: {}
                subscribers:
                  - {}
        "422":
          $ref: "../components.yaml#/components/responses/ValidationError"
        "4XX":
          $ref: "../components.yaml#/components/responses/Error"
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl -X POST "https://api.getdrip.com/v2/YOUR_ACCOUNT_ID/campaigns/CAMPAIGN_ID/subscribers" \
              -H "Content-Type: application/json" \
              -H 'User-Agent: Your App Name (www.yourapp.com)' \
              -u YOUR_API_KEY: \
              -d @- << EOF
              {
                "subscribers": [{
                  "email": "john@acme.com",
                  "utc_offset": 660,
                  "double_optin": true,
                  "starting_email_index": 0,
                  "reactivate_if_removed": true,
                  "custom_fields": {
                    "shirt_size": "Medium"
                  }
                }]
              }
            EOF
        - lang: ruby
          label: Ruby
          source: |
            require 'drip'

            client = Drip::Client.new do |c|
              c.api_key = "YOUR API KEY"
              c.account_id = "YOUR_ACCOUNT_ID"
            end

            campaign_id = 9999999
            email = "someone@example.com"
            options = {
              time_zone: "America/Los_Angeles",
              custom_fields: {
                name: "Jane Doe"
              }
            }

            response = client.subscribe(email, campaign_id, options)

            if response.success?
              # ...
            end
        - lang: javascript
          label: JavaScript
          source: |
            // npm install drip-nodejs --save

            const client = require('drip-nodejs')({ token: YOUR_API_KEY, accountId: YOUR_ACCOUNT_ID });
            const campaignId = 9998888;
            const payload = {
              subscribers: [{
                email: "someone@example.com",
                time_zone: "Asia/Kuala_Lumpur",
                custom_fields: {
                  name: "Jane Doe"
                }
              }]
            }

            client.subscribeToCampaign(campaignId, payload)
              .then((response) => {
                // Handle `response.body`
              })
              .catch((error) => {
                // Handle errors
              });

