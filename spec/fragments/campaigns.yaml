tags:
  - name: Campaigns
    description: Email Series Campaigns in an account.
    x-slate:
      title: Email Series Campaigns
      represent:
        - intro: "Email Series Campaigns are represented as follows:"
          schema: Campaign
        - intro: "All responses containing Email Series Campaign data also include the following top-level link data:"
          json: |
            {
              "links": {
                "campaigns.account": "https://api.getdrip.com/v2/accounts/{campaigns.account}",
                "campaigns.form": "https://api.getdrip.com/v2/{campaigns.account}/forms/{campaigns.forms}",
                "campaigns.subscribers": "https://api.getdrip.com/v2/{campaigns.account}/campaigns/{campaigns.id}/subscribers"
              }
            }
      properties: Campaign

paths:
  /{account_id}/campaigns:
    parameters:
      - $ref: "../components.yaml#/components/parameters/accountId"

    get:
      operationId: listCampaigns
      tags: [Campaigns]
      summary: List all Email Series Campaigns
      x-slate:
        intro: "To list all Email Series Campaigns:"
        response:
          intro: "The response looks like this:"
        arguments: auto
      parameters:
        - name: status
          in: query
          description: "Optional. Filter by one of the following statuses: `draft`, `active`, or `paused`. Defaults to `all`."
          schema:
            type: string
            enum: [all, draft, active, paused]
            default: all
        - name: sort
          in: query
          description: "Optional. Sort results by one of these fields: `created_at` or `name`. Defaults to `created_at`."
          schema:
            type: string
            enum: [created_at, name]
            default: created_at
        - name: direction
          in: query
          description: "Optional. Filter sort direction with: `asc` or `desc`. Defaults to `asc`."
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: A list of Email Series Campaigns. The `campaigns` property is an array of campaign objects.
          content:
            application/json:
              schema:
                type: object
                properties:
                  links:
                    type: object
                    description: Top-level link data included with all responses containing Email Series Campaign data.
                  meta:
                    type: object
                    properties:
                      page:
                        type: integer
                      sort:
                        type: string
                      direction:
                        type: string
                      count:
                        type: integer
                      total_pages:
                        type: integer
                      total_count:
                        type: integer
                      status:
                        type: string
                  campaigns:
                    type: array
                    items:
                      $ref: "#/components/schemas/Campaign"
              example:
                links:
                  campaigns.account: "https://api.getdrip.com/v2/accounts/{campaigns.account}"
                  campaigns.form: "https://api.getdrip.com/v2/{campaigns.account}/forms/{campaigns.forms}"
                  campaigns.subscribers: "https://api.getdrip.com/v2/{campaigns.account}/campaigns/{campaigns.id}/subscribers"
                meta:
                  page: 1
                  sort: created_at
                  direction: asc
                  count: 5
                  total_pages: 1
                  total_count: 5
                  status: all
                campaigns:
                  - id: "123456"
                    status: active
                    name: SEO Email Course
                    from_name: John Doe
                    from_email: john@example.com
                    postal_address: "123 Anywhere St\nFresno, CA 99999"
                    minutes_from_midnight: 440
                    localize_sending_time: true
                    days_of_the_week_mask: "0111110"
                    start_immediately: true
                    double_optin: true
                    send_to_confirmation_page: false
                    use_custom_confirmation_page: false
                    confirmation_url: null
                    notify_subscribe_email: derrick@getdrip.com
                    notify_unsubscribe_email: derrick@getdrip.com
                    bcc: null
                    email_count: 10
                    active_subscriber_count: 320
                    unsubscribed_subscriber_count: 5
                    created_at: "2013-06-21T10:31:58Z"
                    href: "https://api.getdrip.com/v2/9999999/campaigns/123456"
                    links:
                      account: "9999999"
                      forms: ["888"]
        "4XX":
          $ref: "../components.yaml#/components/responses/Error"
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl "https://api.getdrip.com/v2/YOUR_ACCOUNT_ID/campaigns" \
              -H 'User-Agent: Your App Name (www.yourapp.com)' \
              -u YOUR_API_KEY:
        - lang: ruby
          label: Ruby
          source: |
            require 'drip'

            client = Drip::Client.new do |c|
              c.api_key = "YOUR API KEY"
              c.account_id = "YOUR_ACCOUNT_ID"
            end

            response = client.campaigns

            if response.success?
              puts response.body["campaigns"]
            end
        - lang: javascript
          label: JavaScript
          source: |
            // npm install drip-nodejs --save

            const client = require('drip-nodejs')({ token: YOUR_API_KEY, accountId: YOUR_ACCOUNT_ID });
            const options = { status: "active" };

            client.listCampaigns(options)
              .then((response) => {
                // Handle `response.body`
              })
              .catch((error) => {
                // Handle errors
              });

  /{account_id}/campaigns/{campaign_id}:
    parameters:
      - $ref: "../components.yaml#/components/parameters/accountId"
      - name: campaign_id
        in: path
        required: true
        description: The ID of the Email Series Campaign.
        schema:
          type: string

    get:
      operationId: fetchCampaign
      tags: [Campaigns]
      summary: Fetch an Email Series Campaign
      x-slate:
        intro: "To fetch a specific Email Series Campaign:"
        response:
          intro: "The response looks like this:"
        arguments: none
      responses:
        "200":
          description: >-
            The requested Email Series Campaign. The `campaigns` property is an
            array of campaign objects. The `forms` property is an array of forms
            that feed directly into the campaign.
          content:
            application/json:
              schema:
                type: object
                properties:
                  links:
                    type: object
                    description: Top-level link data included with all responses containing Email Series Campaign data.
                  campaigns:
                    type: array
                    items:
                      $ref: "#/components/schemas/Campaign"
                  linked:
                    type: object
                    properties:
                      forms:
                        type: array
                        description: >-
                          The associated forms created for the Email Series
                          Campaign. This is only populated if a form is created
                          for the Email Series Campaign. Refer to Forms for an
                          overview of the properties returned here.
                        items:
                          type: object
              example:
                links:
                  campaigns.account: "https://api.getdrip.com/v2/accounts/{campaigns.account}"
                  campaigns.form: "https://api.getdrip.com/v2/{campaigns.account}/forms/{campaigns.forms}"
                  campaigns.subscribers: "https://api.getdrip.com/v2/{campaigns.account}/campaigns/{campaigns.id}/subscribers"
                campaigns:
                  - id: "123456"
                    status: active
                    name: SEO Email Course
                    from_name: John Doe
                    from_email: john@example.com
                    postal_address: "123 Anywhere St\nFresno, CA 99999"
                    minutes_from_midnight: 440
                    localize_sending_time: true
                    days_of_the_week_mask: "0111110"
                    start_immediately: true
                    double_optin: true
                    send_to_confirmation_page: false
                    use_custom_confirmation_page: false
                    confirmation_url: null
                    notify_subscribe_email: derrick@getdrip.com
                    notify_unsubscribe_email: derrick@getdrip.com
                    bcc: null
                    email_count: 10
                    active_subscriber_count: 320
                    unsubscribed_subscriber_count: 5
                    created_at: "2013-06-21T10:31:58Z"
                    href: "https://api.getdrip.com/v2/9999999/campaigns/123456"
                    links:
                      account: "9999999"
                      forms: ["888"]
                linked:
                  forms: []
        "4XX":
          $ref: "../components.yaml#/components/responses/Error"
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl "https://api.getdrip.com/v2/YOUR_ACCOUNT_ID/campaigns/CAMPAIGN_ID" \
              -H 'User-Agent: Your App Name (www.yourapp.com)' \
              -u YOUR_API_KEY:
        - lang: ruby
          label: Ruby
          source: |
            require 'drip'

            client = Drip::Client.new do |c|
              c.api_key = "YOUR API KEY"
              c.account_id = "YOUR_ACCOUNT_ID"
            end

            campaign_id = 9999999
            response = client.campaign(campaign_id)

            if response.success?
              puts response.body
            end
        - lang: javascript
          label: JavaScript
          source: |
            // npm install drip-nodejs --save

            const client = require('drip-nodejs')({ token: YOUR_API_KEY, accountId: YOUR_ACCOUNT_ID });
            const campaignId = 9998888;

            client.fetchCampaign(campaignId)
              .then((response) => {
                // Handle `response.body`
