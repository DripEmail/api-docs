    get:
      operationId: listCampaignSubscribers
      tags: [Campaigns]
      summary: List all subscribers subscribed to an Email Series Campaign
      x-slate:
        intro: "To list subscribers on an Email Series Campaign:"
        response:
          intro: "The response looks like this:"
        arguments: auto
      parameters:
        - name: status
          in: query
          description: "Optional. The status to filter by: `active`, `unsubscribed`, or `removed`. Defaults to `active`."
          schema:
            type: string
            enum: [active, unsubscribed, removed]
            default: active
        - name: page
          in: query
          description: Optional. The page number. Defaults to `1`.
          schema:
            type: integer
            default: 1
        - name: direction
          in: query
          description: "Optional. The direction to sort the results for `created_at`: `asc` or `desc`. Defaults to `desc`."
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: per_page
          in: query
          description: Optional. The number of records to be returned on each page. Defaults to `100`. Maximum `1000`.
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        "200":
          description: Subscribers on the Email Series Campaign. The `subscribers` property is an array of subscriber objects.
          content:
            application/json:
              schema:
                type: object
                properties:
                  links:
                    type: object
                  meta:
                    type: object
                    properties:
                      page:
                        type: integer
                      direction:
                        type: string
                      count:
                        type: integer
                      total_pages:
                        type: integer
                      total_count:
                        type: integer
                  subscribers:
                    type: array
                    description: An array of subscriber objects (documented under the Subscribers resource).
                    items:
                      type: object
              example:
