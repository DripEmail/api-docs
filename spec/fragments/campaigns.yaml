    CampaignSubscriber:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          description: Required. The subscriber's email address.
        user_id:
          type: string
          description: Optional. A unique identifier for the user in your database, such as a primary key.
        time_zone:
          type: string
          description: Optional. The subscriber's time zone (in Olson format). Defaults to `Etc/UTC`
        double_optin:
          type: boolean
          description: Optional. If `true`, the double opt-in confirmation email is sent; if `false`, the confirmation email is skipped. Defaults to the value set on the Email Series Campaign.
        starting_email_index:
          type: integer
          description: Optional. The index (zero-based) of the email to send first. Defaults to `0`.
        custom_fields:
          type: object
          description: 'Optional. An Object containing custom field data. E.g. `{ "shirt_size": "Medium" }`.'
        tags:
          type: array
          items:
            type: string
          description: 'Optional. An Array containing one or more tags. E.g. `["Customer", "SEO"]`.'
        reactivate_if_removed:
          type: boolean
          description: Optional. If `true`, re-subscribe the subscriber to the Email Series Campaign if there is a removed subscriber in Drip with the same email address; otherwise, respond with `422 Unprocessable Entity`. Defaults to `true`.
        prospect:
          type: boolean
          description: "Optional. A Boolean specifiying whether we should attach a lead score to the subscriber (when lead scoring is enabled). Defaults to `true`. **Note:** This flag used to be called `potential_lead`, which we will continue to accept for backwards compatibility."
        base_lead_score:
          type: integer
          description: Optional. An Integer specifying the starting value for lead score calculation for this subscriber. Defaults to `30`.
        eu_consent:
          type: string
          description: Optional. A String specifying whether the subscriber `granted` or `denied` GDPR consent.
        eu_consent_message:
          type: string
          description: Optional. A String containing the message the subscriber granted or denied their consent to.
