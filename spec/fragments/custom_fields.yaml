tags:
  - name: Custom Fields
    description: Custom field identifiers used in an account.
paths:
  /{account_id}/custom_field_identifiers:
    parameters:
      - $ref: "../components.yaml#/components/parameters/accountId"

    get:
      operationId: listCustomFields
      tags: [Custom Fields]
      summary: List all custom field identifiers used in an account
      x-slate:
        intro: "To list all custom fields:"
        response:
          intro: "The response looks like this:"
          body: |
            {
              "custom_field_identifiers": [ "first_name", "last_name" ]
            }
        sections: |
          **Properties**

          <table>
            <thead>
              <tr>
                <th>Property</th>
                <th>Description</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td><code>custom_field_identifiers</code></td>
                <td>Returns a list of all active custom field identifiers used in the target account.</td>
              </tr>
            </tbody>
          </table>
        arguments: none
      responses:
        "200":
          description: All custom field identifiers used in the account.
          content:
            application/json:
              schema:
                type: object
                required: [custom_field_identifiers]
                properties:
                  custom_field_identifiers:
                    type: array
                    description: Returns a list of all active custom field identifiers used in the target account.
                    items:
                      type: string
              example:
                custom_field_identifiers:
                  - first_name
                  - last_name
        "4XX":
          $ref: "../components.yaml#/components/responses/Error"
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl "https://api.getdrip.com/v2/YOUR_ACCOUNT_ID/custom_field_identifiers" \
              -H 'User-Agent: Your App Name (www.yourapp.com)' \
              -u YOUR_API_KEY:
        - lang: ruby
          label: Ruby
          source: |
            require 'drip'

            client = Drip::Client.new do |c|
              c.api_key = "YOUR API KEY"
              c.account_id = "YOUR_ACCOUNT_ID"
            end

            response = client.custom_fields

            if response.success?
              puts response.body["custom_field_identifiers"]
            end
        - lang: javascript
          label: JavaScript
          source: |
            // npm install drip-nodejs --save

            const client = require('drip-nodejs')({ token: YOUR_API_KEY, accountId: YOUR_ACCOUNT_ID });

            client.listAllCustomFields()
              .then((response) => {
                // Handle `response.body`
              })
              .catch((error) => {
                // Handle errors
              });
