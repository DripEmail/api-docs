components:
  schemas:
    Order:
      type: object
      description: |
        An order to create or update. Either `email` or `id` must be included
        to identify the order's subscriber.
      required: [amount]
      properties:
        email:
          type: string
          format: email
          description: The email address of the order's subscriber. Either `email` or `id` must be included.
        id:
          type: string
          description: The Drip `id` of the order's subscriber. Either `email` or `id` must be included.
        amount:
          type: integer
          description: The total amount of the order in cents (e.g. if the order was $49.99, set the amount to `4999`).
        provider:
          type: string
          description: Required for updates. The identifier for the provider from which the order data was received in lower snake cased form. For example, `shopify` or `my_store`. Used to identify the order for updates.
        tax:
          type: integer
          description: The tax on the order in cents (e.g. if the order was $1.00, set the tax to `100`).
        fees:
          type: integer
          description: The fees on the order in cents (e.g. if the order was $1.00, set the fees to `100`).
        discount:
          type: integer
          description: The discount on the order in cents (e.g. if the order was $5.00, set the discount to `500`).
        permalink:
          type: string
          description: A URL for the human-readable interface to view the order details.
        currency_code:
          type: string
          description: The alphabetic [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217) code for the currency of the purchase.
        upstream_id:
          type: string
          description: Required for updates. A unique, internal id for the order (generally the primary key generated by the order management system). Used to identify the order for updates.
        identifier:
          type: string
          description: A unique, external identifier for the order. This will be displayed in the Drip UI and should correspond to what a customer sees on invoices, email confirmations, etc.
        properties:
          type: object
          description: 'An Object containing properties about the order. E.g. `{ "size": "large" }`'
        occurred_at:
          type: string
          description: The String time at which the order occurred in [ISO-8601](http://en.wikipedia.org/wiki/ISO_8601) format. Defaults to the current time.
        closed_at:
          type: string
          description: The String time at which the order closed in [ISO-8601](http://en.wikipedia.org/wiki/ISO_8601) format.
        cancelled_at:
          type: string
          description: The String time at which the order was cancelled in [ISO-8601](http://en.wikipedia.org/wiki/ISO_8601) format. For an order that was not cancelled, this will be `nil`.
        financial_state:
          type: string
          description: The financial status of the order.
          enum:
            - pending
            - authorized
            - partially_paid
            - paid
            - partially_refunded
            - refunded
            - voided
        fulfillment_state:
          type: string
          description: The fulfillment status of the order.
          enum:
            - not_fulfilled
            - partially_fulfilled
            - fulfilled
        billing_address:
          $ref: "#/components/schemas/OrderAddress"
          description: An object containing billing address information.
        shipping_address:
          $ref: "#/components/schemas/OrderAddress"
          description: An object containing shipping address information.
        items:
          type: array
          description: An Array of objects containing information about specific order items.
          items:
            $ref: "#/components/schemas/OrderItem"

    OrderAddress:
      type: object
      description: A billing or shipping address on an order.
      properties:
        name:
          type: string
          description: The full name on the address.
        first_name:
          type: string
          description: The first name on the address.
        last_name:
          type: string
          description: The last name on the address.
        company:
          type: string
          description: The company on the address.
        address_1:
          type: string
          description: The street address.
        address_2:
          type: string
          description: Additional line of the street address.
        city:
          type: string
          description: The address city.
        state:
          type: string
          description: The address state.
        zip:
          type: string
          description: The address zip code.
        country:
          type: string
          description: The address country.
        phone:
          type: string
          description: The phone number associated with the address.
        email:
          type: string
          description: The email associated with the address.

    OrderItem:
      type: object
      description: A line item on an order.
      required: [name, amount]
      properties:
        name:
          type: string
          description: The product name.
        amount:
          type: integer
          description: The line total (in cents).
        price:
          type: integer
          description: The item price (in cents).
        tax:
          type: integer
          description: The item tax (in cents).
        fees:
          type: integer
          description: The item fees (in cents).
        discount:
          type: integer
          description: The item discount (in cents).
        quantity:
          type: integer
          description: The quantity of the item ordered (if omitted, defaults to 1).
        product_id:
          type: string
          description: A unique identifier for the specific product.
        upstream_id:
          type: string
          description: A unique identifier for the item from the provider.
        upstream_product_id:
          type: string
          description: A unique identifier for the specific product from the provider.
        upstream_product_variant_id:
          type: string
          description: A unique identifier for the specific product variant from the provider.
        sku:
          type: string
          description: The product SKU number.
        taxable:
          type: boolean
          description: Boolean indicating whether the item is taxable.
        properties:
          type: object
          description: An Object containing properties about the line item.
        id:
          type: string
          description: A unique id for the line item. Appears in the request and representation examples but is not documented in the arguments table.

    Refund:
      type: object
      description: A refund to create or update for an order.
      required: [provider, order_upstream_id, amount]
      properties:
        provider:
          type: string
          description: The provider for the Order being refunded.
        order_upstream_id:
          type: string
          description: The `upstream_id` for the Order being refunded.
        amount:
          type: integer
          description: The amount of the refund.
        upstream_id:
          type: string
          description: Required for updates. The unique id of refund in the order management system. Used to identify the refund for updates.
        note:
          type: string
          description: A note about the refund.
        processed_at:
          type: string
          description: The String time at which the refund was processed in [ISO-8601](http://en.wikipedia.org/wiki/ISO_8601) format.
