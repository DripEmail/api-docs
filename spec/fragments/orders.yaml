  /{account_id}/refunds:
    parameters:
      - $ref: "../components.yaml#/components/parameters/accountId"

    post:
      operationId: createOrUpdateRefund
      tags: [Orders]
      summary: Create or update a refund
      description: |
        When a refund is created, the subscriber's `lifetime_value` attribute
        will be automatically decremented by the total amount of the refund.

        To update an existing refund, include the `upstream_id` for that
        refund in the payload.
      x-slate:
        intro: "To create or update a refund for an order:"
        response:
          intro: "Responds with a `202 Accepted` and an empty JSON response:"
        sections: |
          When a refund is created, the subscriber's `lifetime_value` attribute
          will be automatically decremented by the total amount of the refund.

          To update an existing refund, include the <code>upstream_id</code> for that refund in the payload.
        arguments: |
          <table>
            <thead>
              <tr>
                <th>Property</th>
                <th>Description</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td><code>provider</code></td>
                <td>Required. The provider for the Order being refunded.</td>
              </tr>
              <tr>
                <td><code>order_upstream_id</code></td>
                <td>Required. The <code>upstream_id</code> for the Order being refunded.</td>
              </tr>
              <tr>
                <td><code>amount</code></td>
                <td>Required. The amount of the refund.</td>
              </tr>
              <tr>
                <td><code>upstream_id</code></td>
                <td>Optional. Required for updates. The unique id of refund in the order management system. Used to identify the refund for updates.</td>
              </tr>
              <tr>
                <td><code>note</code></td>
                <td>Optional. A note about the refund.</td>
              </tr>
              <tr>
                <td><code>processed_at</code></td>
                <td>Optional. The String time at which the refund was processed in <a href="http://en.wikipedia.org/wiki/ISO_8601">ISO-8601</a> format.</td>
              </tr>
            </tbody>
          </table>
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refunds]
              properties:
                refunds:
                  type: array
                  description: The list of refunds to create or update.
                  items:
                    $ref: "#/components/schemas/Refund"
            example:
              refunds:
                - provider: "shopify"
                  order_upstream_id: "abcdef"
                  upstream_id: "tuvwx"
                  amount: 2000
                  note: "Incorrect size"
                  processed_at: "2013-06-22T10:41:11Z"
      responses:
        "202":
          description: Accepted. Responds with an empty JSON response.
          content:
            application/json:
              schema:
                type: object
              example: {}
        "422":
          $ref: "../components.yaml#/components/responses/ValidationError"
        "4XX":
          $ref: "../components.yaml#/components/responses/Error"
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl -X POST "https://api.getdrip.com/v2/YOUR_ACCOUNT_ID/refunds" \
              -H "Content-Type: application/json" \
              -H 'User-Agent: Your App Name (www.yourapp.com)' \
              -u YOUR_API_KEY: \
              -d @- << EOF
              {
                "refunds": [{
                    "provider": "shopify",
                    "order_upstream_id": "abcdef",
                    "upstream_id": "tuvwx",
                    "amount": 2000,
                    "note": "Incorrect size",
                    "processed_at": "2013-06-22T10:41:11Z"
                  }]
              }
            EOF
        - lang: ruby
          label: Ruby
          source: |
            require 'drip'

            client = Drip::Client.new do |c|
              c.api_key = "YOUR API KEY"
              c.account_id = "YOUR_ACCOUNT_ID"
