tags:
  - name: Subscribers
    description: People in an account. All subscriber API endpoints only work with your active people; attempting to modify or delete an inactive person will result in an error.
    x-slate:
      represent:
        - intro: "Subscribers are represented as follows:"
          schema: Subscriber
        - intro: "All responses containing subscriber data also include the following top-level link data:"
          json: |
            {
              "links": {
                "subscribers.account": "https://api.getdrip.com/v2/accounts/{subscribers.account}"
              }
            }
      properties: Subscriber
      lead_extra: |
        **Note:** All subscriber API endpoints only work with your <a href="https://www.drip.com/learn/docs/manual/people/active" target="_blank">active</a> people. Attempting to modify or delete an <a href="https://www.drip.com/learn/docs/manual/people/inactive" target="_blank">inactive</a> person will result in an error.

paths:
  /{account_id}/subscribers:
    parameters:
      - $ref: "../components.yaml#/components/parameters/accountId"

    post:
      operationId: createOrUpdateSubscriber
      tags: [Subscribers]
      summary: Create or update a subscriber
      x-slate:
        order: 0
        intro: "To create or update a subscriber:"
        response:
          intro: "The response looks like this:"
        show-description: true
        arguments: auto
      description: |
        If you need to create or update a collection of subscribers at once,
        use our [batch API](/) instead.

        **Note:** Concurrently updating the same subscriber via multiple API
        calls is not supported and will fail with a rate limit error and the
        message "Too many concurrent requests for the same subscriber". You
        should retry the call after a short wait period to let the other
        requests to the same subscriber complete. Triggering this rate limit
        does not mean you've consumed your overall API rate limited capacity.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subscribers]
              properties:
                subscribers:
                  type: array
                  items:
                    $ref: "#/components/schemas/SubscriberRequest"
            example:
              subscribers:
                - email: john@acme.com
                  time_zone: America/Los_Angeles
                  custom_fields:
                    shirt_size: Medium
      responses:
        "200":
          description: The created or updated subscriber. The `subscribers` property is an array of one object.
          content:
            application/json:
              schema:
                type: object
                required: [subscribers]
                properties:
                  links:
                    type: object
                    description: Top-level link data included with all responses containing subscriber data.
                    properties:
                      "subscribers.account":
                        type: string
                  subscribers:
                    type: array
                    description: An array of one subscriber object.
                    items:
                      $ref: "#/components/schemas/Subscriber"
              example:
                links:
                  subscribers.account: "https://api.getdrip.com/v2/accounts/{subscribers.account}"
                subscribers:
                  - id: z1togz2hcjrkpp5treip
                    status: active
                    email: john@acme.com
                    first_name: John
                    last_name: Doe
                    address1: 123 Main St.
                    address2: Suite 200
                    city: Los Angeles
                    state: CA
                    zip: "90210"
                    country: US
                    phone: 555-555-5555
                    sms_number: "+16125551212"
                    sms_consent: true
                    eu_consent: granted
                    time_zone: America/Los_Angeles
                    utc_offset: -440
                    visitor_uuid: sa8f7sdf78sdsdahf788d7asf8sd
                    custom_fields:
                      shirt_size: Medium
                    tags: [Customer, SEO]
                    ip_address: 111.111.111.11
                    user_agent: Chrome/36.0.1985.143
                    original_referrer: "http://www.getdrip.com"
                    landing_url: "https://www.getdrip.com/docs/rest-api"
                    prospect: true
                    lead_score: 72
                    lifetime_value: 10000
                    created_at: "2013-06-21T10:31:58Z"
                    href: "https://api.getdrip.com/v2/9999999/subscribers/12345"
                    user_id: "12345"
                    base_lead_score: 30
                    links:
                      account: "9999999"
        "422":
          $ref: "../components.yaml#/components/responses/ValidationError"
        "4XX":
          $ref: "../components.yaml#/components/responses/Error"
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl -X POST "https://api.getdrip.com/v2/YOUR_ACCOUNT_ID/subscribers" \
            -H 'User-Agent: Your App Name (www.yourapp.com)' \
            -H 'Content-Type: application/json' \
            -u YOUR_API_KEY: \
            -d @- << EOF
            {
              "subscribers": [{
                "email": "john@acme.com",
                "time_zone": "America/Los_Angeles",
                "custom_fields": {
                  "shirt_size": "Medium"
                }
              }]
            }
            EOF
        - lang: ruby
          label: Ruby
          source: |
            require 'drip'

            client = Drip::Client.new do |c|
              c.api_key = "YOUR API KEY"
              c.account_id = "YOUR_ACCOUNT_ID"
            end

            subscriber_email = "john@acme.com"
            options = {
              time_zone: "America/Los_Angeles",
              custom_fields: {
                shirt_size: "Medium"
              }
            }

            response = client.create_or_update_subscriber(subscriber_email, options)

            if response.success?
              puts response.body["subscribers"]
            end
        - lang: javascript
          label: JavaScript
          source: |
            // npm install drip-nodejs --save

            const client = require('drip-nodejs')({ token: YOUR_API_KEY, accountId: YOUR_ACCOUNT_ID });
            const payload = {
              email: "john@acme.com",
              time_zone: "America/Los_Angeles",
              custom_fields: {
                shirt_size: "Medium"
              }
            };

            client.createUpdateSubscriber(payload)
              .then((response) => {
                // Handle `response.body`
              })
              .catch((error) => {
                // Handle errors
              });

    get:
      operationId: listSubscribers
      tags: [Subscribers]
      summary: List all subscribers
      x-slate:
        order: 1
        intro: "To list subscribers:"
        response:
          intro: "The response looks like this:"
        arguments: auto
      parameters:
        - name: status
          in: query
          required: false
          description: >-
            Filter by one of the following statuses: `all`, `active`,
            `unsubscribed`, `active_or_unsubscribed` or `undeliverable`.
            Defaults to `active`.
          schema:
            type: string
            enum: [all, active, unsubscribed, active_or_unsubscribed, undeliverable]
            default: active
        - name: tags
          in: query
          required: false
          description: A comma separated list of tags. When included, returns only subscribers who have at least one of the listed tags.
          schema:
            type: string
        - name: subscribed_before
          in: query
          required: false
          description: A [ISO-8601](http://en.wikipedia.org/wiki/ISO_8601) datetime. When included, returns only subscribers who were created before the date. Eg. `"2017-01-01T00:00:00Z"`
          schema:
            type: string
            format: date-time
        - name: subscribed_after
          in: query
          required: false
          description: A [ISO-8601](http://en.wikipedia.org/wiki/ISO_8601) datetime. When included, returns only subscribers who were created after the date. Eg. `"2016-01-01T00:00:00Z"`
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          required: false
          description: The page number. Defaults to `1`.
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          required: false
          description: The number of records to be returned on each page. Defaults to `100`. Maximum `1000`.
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        "200":
          description: A list of subscribers. The `subscribers` property is an array of subscriber objects; the `meta` property contains pagination information.
          content:
            application/json:
              schema:
                type: object
                required: [subscribers]
                properties:
                  links:
                    type: object
                    description: Top-level link data included with all responses containing subscriber data.
                    properties:
                      "subscribers.account":
                        type: string
                  meta:
                    type: object
                    description: Pagination information.
                    properties:
                      page:
                        type: integer
                      count:
                        type: integer
                      total_pages:
                        type: integer
                      total_count:
                        type: integer
                  subscribers:
                    type: array
                    description: An array of subscriber objects.
                    items:
                      $ref: "#/components/schemas/Subscriber"
              example:
                links:
                  subscribers.account: "https://api.getdrip.com/v2/accounts/{subscribers.account}"
                meta:
                  page: 1
                  count: 5
                  total_pages: 1
                  total_count: 5
                subscribers:
                  - id: z1togz2hcjrkpp5treip
                    status: active
                    email: john@acme.com
                    first_name: John
                    last_name: Doe
                    address1: 123 Main St.
                    address2: Suite 200
                    city: Los Angeles
                    state: CA
                    zip: "90210"
                    country: US
                    phone: 555-555-5555
                    sms_number: "+16125551212"
                    sms_consent: true
                    eu_consent: granted
                    time_zone: America/Los_Angeles
                    utc_offset: -440
                    visitor_uuid: sa8f7sdf78sdsdahf788d7asf8sd
                    custom_fields:
                      shirt_size: Medium
                    tags: [Customer, SEO]
                    ip_address: 111.111.111.11
                    user_agent: Chrome/36.0.1985.143
                    original_referrer: "http://www.getdrip.com"
                    landing_url: "https://www.getdrip.com/docs/rest-api"
