components:
  schemas:
    Webhook:
      type: object
      properties:
        id:
          type: string
          description: A read-only Drip generated unique id used to identify each webhook record.
        href:
          type: string
          description: The url designated for retrieving the webhook record via the REST API.
        post_url:
          type: string
          description: The url that the webhook will post to.
        version:
          type: string
          description: The webhook version. The current stable version is 2.
        include_received_email:
          type: boolean
          description: Returns true if a notification is sent whenever a subscriber receives an email.
        events:
          type: array
          description: An array specifying which events are enabled for webhook notifications.
          items:
            type: string
        created_at:
          type: string
          description: A timestamp representing when the webhook record was first created.
        links:
          type: object
          description: An object containing the REST API URL for the account.

    NewWebhook:
      type: object
      required: [post_url]
      properties:
        post_url:
          type: string
          description: The url that the webhook will post to.
        include_received_email:
          type: boolean
          description: Optional. A Boolean specifying whether we should send a notification whenever a subscriber receives an email. Defaults to `false`.
        events:
          type: array
          description: Optional. An Array specifiying which events we should send notifications for. Eligible events can be found in the [webhooks documentation](#webhook-events). By default, we will send notifications for all events except `subscrber.received_email`.
          items:
            type: string
