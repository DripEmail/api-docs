        name: Main Funnel
        status: active
        created_at: "2016-07-01T10:00:00Z"
        links:
          account: "9999999"
      properties:
        id:
          type: string
          description: A read-only Drip generated unique id used to identify each workflow record.
        href:
          type: string
          description: The url designated for retrieving the workflow record via the REST API.
        name:
          type: string
          description: The name assigned to the workflow.
        status:
          type: string
          description: The workflow's status whether `draft`, `active`, or `paused`.
          enum: [draft, active, paused]
        created_at:
          type: string
          format: date-time
          description: A timestamp representing when the workflow record was first created.
        links:
          type: object
          description: An object containing the REST API URL for the account.
          properties:
            account:
              type: string

    WorkflowSubscriber:
      type: object
      description: >-
        A subscriber to start on the workflow. Either `email` or `id` must
        be included.
      properties:
        email:
          type: string
          format: email
          description: The subscriber's email address. Either `email` or `id` must be included.
        id:
          type: string
          description: The subscriber's Drip `id`. Either `email` or `id` must be included.
        first_name:
          type: string
          description: The subscriber's first name.
        last_name:
          type: string
          description: The subscriber's last name.
        address1:
          type: string
          description: The subscriber's mailing address.
        address2:
          type: string
          description: An additional field for the subscriber's mailing address.
        city:
          type: string
          description: The city, town, or village in which the subscriber resides.
        state:
          type: string
          description: The region in which the subscriber resides. Typically a province, a state, or a prefecture.
        zip:
          type: string
          description: The postal code in which the subscriber resides, also known as zip, postcode, Eircode, etc.
        country:
          type: string
          description: The country in which the subscriber resides.
        phone:
          type: string
          description: The subscriber's primary phone number.
        user_id:
          type: string
          description: A unique identifier for the user in your database, such as a primary key.
        time_zone:
          type: string
          description: The subscriber's time zone (in Olson format). Defaults to `Etc/UTC`.
          default: Etc/UTC
        custom_fields:
          type: object
          description: 'An Object containing custom field data. E.g. `{ "shirt_size": "Medium" }`.'
        tags:
          type: array
          description: 'An Array containing one or more tags. E.g. `["Customer", "SEO"]`.'
          items:
            type: string
        prospect:
          type: boolean
          description: >-
            A Boolean specifiying whether we should attach a lead score to
            the subscriber (when lead scoring is enabled). Defaults to
            `true`. **Note:** This flag used to be called `potential_lead`,
            which we will continue to accept for backwards compatibility.
          default: true
        eu_consent:
          type: string
          description: A String specifying whether the subscriber `granted` or `denied` GDPR consent.
        eu_consent_message:
          type: string
          description: A String containing the message the subscriber granted or denied their consent to.

    Trigger:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        provider:
          type: string
          description: A String indicating a provider.
        trigger_type:
          type: string
          description: A String indicating the automation trigger type.
        properties:
          type: object
          description: An Object containing properties for the given trigger.
        actions_required:
          type: array
          items:
            type: object
            properties:
              code:
                type: string
              message:
                type: string

    TriggerRequest:
      type: object
      required: [provider, trigger_type]
      properties:
        provider:
          type: string
          description: A String indicating a provider.
        trigger_type:
          type: string
          description: A String indicating the automation trigger type.
        properties:
          type: object
          description: An Object containing properties for the given trigger.
