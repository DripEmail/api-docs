  /{account_id}/workflows/{workflow_id}/subscribers:
    parameters:
      - $ref: "../components.yaml#/components/parameters/accountId"
      - name: workflow_id
        in: path
        required: true
        description: The ID of the workflow.
        schema:
          type: string

    post:
      operationId: startSubscriberOnWorkflow
      tags: [Workflows]
      summary: Start someone on a workflow
      description: >-
        If the workflow is not active, the subscriber will not be added to
        the workflow.
      x-slate:
        intro: "To start someone on a workflow:"
        response:
          intro: "The response looks like this:"
        show-description: true
        arguments: auto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subscribers]
              properties:
                subscribers:
                  type: array
                  description: An array containing one subscriber object.
                  items:
                    $ref: "#/components/schemas/WorkflowSubscriber"
            example:
              subscribers:
                - email: john@acme.com
                  time_zone: America/Los_Angeles
                  custom_fields:
                    shirt_size: Medium
      responses:
        "200":
          description: The subscribers property is an array of one object.
          content:
            application/json:
              schema:
                type: object
                properties:
                  links:
                    type: object
                    description: Top-level link data.
                  subscribers:
                    type: array
                    description: >-
                      An array of one subscriber object (documented under the
                      Subscribers resource; not defined here).
                    items:
                      type: object
        "422":
          $ref: "../components.yaml#/components/responses/ValidationError"
        "4XX":
          $ref: "../components.yaml#/components/responses/Error"
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl -X POST "https://api.getdrip.com/v2/YOUR_ACCOUNT_ID/workflows/WORKFLOW_ID/subscribers" \
              -H "Content-Type: application/json" \
              -H 'User-Agent: Your App Name (www.yourapp.com)' \
              -u YOUR_API_KEY: \
              -d @- << EOF
              {
                "subscribers": [{
                  "email": "john@acme.com",
                  "time_zone": "America/Los_Angeles",
                  "custom_fields": {
                    "shirt_size": "Medium"
                  }
                }]
              }
            EOF
        - lang: ruby
          label: Ruby
          source: |
            require 'drip'

            client = Drip::Client.new do |c|
              c.api_key = "YOUR API KEY"
              c.account_id = "YOUR_ACCOUNT_ID"
            end

            workflow_id = 9999999
            options = {
              email: "john@acme.com",
              time_zone: "America/Los_Angeles",
              custom_fields: {
                shirt_size: "Medium"
              }
            }
            response = client.start_subscriber_workflow(workflow_id, options)

            if response.success?
              puts response.body["subscribers"]
            end
        - lang: javascript
          label: JavaScript
          source: |
            // npm install drip-nodejs --save

            const client = require('drip-nodejs')({ token: YOUR_API_KEY, accountId: YOUR_ACCOUNT_ID });
            const workflowId = 222333;
            const payload = {
              subscribers: [{
                email: "john@acme.com",
                time_zone: "America/Los_Angeles",
                custom_fields: {
                  shirt_size: "Medium"
                }
              }]
            }

            client.startOnWorkflow(workflowId, payload)
              .then((response) => {
                // Handle `response.body`
