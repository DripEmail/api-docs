tags:
  - name: Workflows
    description: Automation workflows in an account, with draft, active, or paused statuses.
    x-slate:
      represent:
        - intro: "Workflows are represented as follows:"
          schema: Workflow
        - intro: "All responses containing workflow data also include the following top-level link data:"
          json: |
            {
              "links": {
                "workflows.account": "https://api.getdrip.com/v2/accounts/{workflows.account}"
              }
            }
      properties: Workflow

paths:
  /{account_id}/workflows:
    parameters:
      - $ref: "../components.yaml#/components/parameters/accountId"

    get:
      operationId: listWorkflows
      tags: [Workflows]
      summary: List all workflows
      x-slate:
        intro: "To list all workflows:"
        response:
          intro: "The response looks like this:"
        arguments: auto
      parameters:
        - name: status
          in: query
          required: false
          description: >-
            Filter by one of the following statuses: `draft`, `active`, or
            `paused`. Defaults to `all`.
          schema:
            type: string
            enum: [all, draft, active, paused]
            default: all
        - name: sort
          in: query
          required: false
          description: >-
            Sort results by one of these fields: `created_at` or `name`.
            Defaults to `created_at`.
          schema:
            type: string
            enum: [created_at, name]
            default: created_at
        - name: direction
          in: query
          required: false
          description: >-
            Filter sort direction with: `asc` or `desc`. Defaults to `asc`.
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: All workflows in the account.
          content:
            application/json:
              schema:
                type: object
                properties:
                  links:
                    type: object
                    description: Top-level link data.
                  meta:
                    type: object
                    description: Pagination metadata.
                    properties:
                      page:
                        type: integer
                      sort:
                        type: string
                      direction:
                        type: string
                      count:
                        type: integer
                      total_pages:
                        type: integer
                      total_count:
                        type: integer
                      status:
                        type: string
                  workflows:
                    type: array
                    description: An array of workflow objects.
                    items:
                      $ref: "#/components/schemas/Workflow"
              example:
                links:
                  workflows.account: "https://api.getdrip.com/v2/accounts/{workflows.account}"
                meta:
                  page: 1
                  sort: sort_order
                  direction: desc
                  count: 5
                  total_pages: 1
                  total_count: 5
                  status: all
                workflows:
                  - id: "123456"
                    href: "https://api.getdrip.com/v2/9999999/workflows/123456"
                    name: Main Funnel
                    status: active
                    created_at: "2016-07-01T10:00:00Z"
                    links:
                      account: "9999999"
        "4XX":
          $ref: "../components.yaml#/components/responses/Error"
      x-codeSamples:
        - lang: shell
          label: cURL
          source: |
            curl "https://api.getdrip.com/v2/YOUR_ACCOUNT_ID/workflows" \
              -H 'User-Agent: Your App Name (www.yourapp.com)' \
              -u YOUR_API_KEY:
        - lang: ruby
          label: Ruby
          source: |
            require 'drip'

            client = Drip::Client.new do |c|
              c.api_key = "YOUR API KEY"
              c.account_id = "YOUR_ACCOUNT_ID"
            end

            response = client.workflows

            if response.success?
              puts response.body["workflows"]
            end
        - lang: javascript
          label: JavaScript
          source: |
            // npm install drip-nodejs --save

            const client = require('drip-nodejs')({ token: YOUR_API_KEY, accountId: YOUR_ACCOUNT_ID });
            const options = { status: "active" };

            client.listAllWorkflows(options)
              .then((response) => {
                // Handle `response.body`
              })
              .catch((error) => {
                // Handle errors
              });

